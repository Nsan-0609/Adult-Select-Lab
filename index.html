<script>
  /*
    =====================================================
    Adult Select Lab 商品カード設定
    =====================================================

    重要：
    下の DMM_MAIN_LINK に、あなたのDMM/FANZAアフィリエイトリンクを入れてください。

    まだ正式リンクがない場合でも、このコードなら example.com には飛びません。
    リンク未設定時はクリックしても案内だけ出ます。
  */

  const DMM_MAIN_LINK = ""; 
  // 例：
  // const DMM_MAIN_LINK = "ここにあなたのDMM/FANZAアフィリエイトリンク";

  const contents = [
    {
      title: "無料サンプルで雰囲気を確認しやすい作品まとめ",
      description: "いきなり購入せず、まず公式ページで内容を確認したい人向け。初めてでも判断しやすいカテゴリです。",
      reason: "無料サンプル確認を起点にできるため、購入前の不安を減らしやすい構成です。",
      score: 89,
      stars: "★★★★★",
      tags: ["sample", "beginner"],
      labels: ["無料サンプルあり", "初心者向け"],
      poster: "p1",
      posterLabel: "SAMPLE GUIDE",
      affiliateUrl: DMM_MAIN_LINK,
      sampleUrl: DMM_MAIN_LINK
    },
    {
      title: "セール中から選びたい人向けコンテンツ",
      description: "価格を抑えながら選びたい人向け。キャンペーンや割引情報の確認に向いています。",
      reason: "セール対象を優先して探せるため、コスパ重視の人に向いています。",
      score: 84,
      stars: "★★★★☆",
      tags: ["sale"],
      labels: ["セール中", "価格重視"],
      poster: "p2",
      posterLabel: "SALE SELECT",
      affiliateUrl: DMM_MAIN_LINK,
      sampleUrl: DMM_MAIN_LINK
    },
    {
      title: "月額見放題サービスを比較したい人向け",
      description: "単品購入よりも、複数作品をまとめて確認したい人に向いている比較カテゴリです。",
      reason: "見放題サービスは作品数・更新頻度・料金の比較が重要なため、候補整理に向いています。",
      score: 87,
      stars: "★★★★★",
      tags: ["subscription", "beginner"],
      labels: ["見放題", "比較向け"],
      poster: "p3",
      posterLabel: "SUBSCRIPTION",
      affiliateUrl: DMM_MAIN_LINK,
      sampleUrl: DMM_MAIN_LINK
    },
    {
      title: "新着から注目作品を探す",
      description: "新しく追加された作品やサービスを中心に確認したい人向けのカテゴリです。",
      reason: "新着はトレンド性が高く、記事ネタにも使いやすいです。",
      score: 82,
      stars: "★★★★☆",
      tags: ["new", "sample"],
      labels: ["新着", "無料確認"],
      poster: "p4",
      posterLabel: "NEW ARRIVAL",
      affiliateUrl: DMM_MAIN_LINK,
      sampleUrl: DMM_MAIN_LINK
    },
    {
      title: "初めての人でも選びやすい定番カテゴリ",
      description: "何から見ればいいか分からない人向けに、確認しやすさを重視したカテゴリです。",
      reason: "ジャンル選びで迷いやすい初心者でも、無料確認とスコアで候補を絞れます。",
      score: 91,
      stars: "★★★★★",
      tags: ["beginner", "sample"],
      labels: ["初心者向け", "定番"],
      poster: "p2",
      posterLabel: "BEGINNER",
      affiliateUrl: DMM_MAIN_LINK,
      sampleUrl: DMM_MAIN_LINK
    },
    {
      title: "ランキング上位から選びたい人向け",
      description: "迷ったときに人気順・注目度を参考にしたい人向けのまとめカテゴリです。",
      reason: "ランキングは判断材料として使いやすく、購入前の候補選びに役立ちます。",
      score: 85,
      stars: "★★★★☆",
      tags: ["sample", "sale"],
      labels: ["ランキング", "注目"],
      poster: "p1",
      posterLabel: "RANKING",
      affiliateUrl: DMM_MAIN_LINK,
      sampleUrl: DMM_MAIN_LINK
    }
  ];

  const ageModal = document.getElementById("ageModal");
  const enterBtn = document.getElementById("enterBtn");
  const exitBtn = document.getElementById("exitBtn");
  const productGrid = document.getElementById("productGrid");
  const filterButtons = document.querySelectorAll(".filter-btn");
  const searchInput = document.getElementById("searchInput");

  let currentFilter = "all";

  function checkAge() {
    const verified = localStorage.getItem("asl_age_verified");

    if (verified === "yes") {
      document.body.classList.remove("age-locked");
      ageModal.classList.remove("show");
    } else {
      document.body.classList.add("age-locked");
      ageModal.classList.add("show");
    }
  }

  enterBtn.addEventListener("click", () => {
    localStorage.setItem("asl_age_verified", "yes");
    document.body.classList.remove("age-locked");
    ageModal.classList.remove("show");
  });

  exitBtn.addEventListener("click", () => {
    window.location.href = "https://www.google.com/";
  });

  function openAffiliateLink(url) {
    if (!url || url.trim() === "") {
      alert("現在リンク準備中です。DMM/FANZAの承認後、公式リンクを設定します。");
      return;
    }

    window.open(url, "_blank", "noopener,noreferrer");
  }

  function renderProducts() {
    const keyword = searchInput.value.trim().toLowerCase();

    const filtered = contents.filter(item => {
      const matchFilter = currentFilter === "all" || item.tags.includes(currentFilter);

      const searchableText = [
        item.title,
        item.description,
        item.reason,
        item.labels.join(" "),
        item.tags.join(" ")
      ].join(" ").toLowerCase();

      const matchKeyword = keyword === "" || searchableText.includes(keyword);

      return matchFilter && matchKeyword;
    });

    if (filtered.length === 0) {
      productGrid.innerHTML = `
        <div class="guide-card" style="grid-column: 1 / -1;">
          <h3>該当するコンテンツが見つかりませんでした</h3>
          <p style="color: var(--muted); font-size: 14px;">
            キーワードやカテゴリを変えて再検索してください。
          </p>
        </div>
      `;
      return;
    }

    productGrid.innerHTML = filtered.map((item, index) => `
      <article class="product-card">
        <div class="poster ${item.poster}" data-label="${item.posterLabel}"></div>

        <div class="product-body">
          <div class="mock-tags">
            ${item.labels.map(label => `<span class="tag gold">${label}</span>`).join("")}
          </div>

          <h3>${item.title}</h3>
          <p>${item.description}</p>

          <div class="product-score">
            <div class="product-score-top">
              <span>Adult Select Score</span>
              <span>${item.score} / 100</span>
            </div>
            <div class="score-bar">
              <span style="width: ${item.score}%;"></span>
            </div>
            <div style="margin-top: 8px;" class="stars">${item.stars}</div>
          </div>

          <p>
            <strong style="color: var(--text);">このカテゴリを選ぶ理由：</strong><br />
            ${item.reason}
          </p>

          <div class="card-actions">
            <button class="official" type="button" onclick="openAffiliateLink(contents[${index}].affiliateUrl)">
              公式ページで詳細を見る
            </button>
            <button class="sample" type="button" onclick="openAffiliateLink(contents[${index}].sampleUrl)">
              無料サンプルを確認する
            </button>
          </div>
        </div>
      </article>
    `).join("");
  }

  filterButtons.forEach(button => {
    button.addEventListener("click", () => {
      filterButtons.forEach(btn => btn.classList.remove("active"));
      button.classList.add("active");
      currentFilter = button.dataset.filter;
      renderProducts();
    });
  });

  searchInput.addEventListener("input", renderProducts);

  checkAge();
  renderProducts();
</script>
